<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Checker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%); min-height: 100vh; }
        .stat-card { transition: transform 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); }
        .check-btn { background: linear-gradient(45deg, #4f46e5, #7c3aed); }
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content {
            background: linear-gradient(135deg, #2a2a40 0%, #1e1e2f 100%);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
            max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto;
            transform: scale(0.9); transition: transform 0.3s ease;
        }
        .modal-overlay.show .modal-content { transform: scale(1); }
        .token-detail-item {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 16px; margin-bottom: 12px;
        }
        .token-index {
            background: linear-gradient(45deg, #4f46e5, #7c3aed);
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .copy-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; padding: 6px 12px; font-size: 13px;
            display: flex; align-items: center; gap: 6px; cursor: pointer;
            transition: all 0.3s ease; color: white;
        }
        .copy-btn:hover { background: rgba(124, 58, 237, 0.3); border-color: #7c3aed; }
        .token-text {
            background: rgba(0,0,0,0.3); border-radius: 8px; padding: 10px;
            font-family: monospace; font-size: 12px; word-break: break-all;
            color: #a5b4fc; margin-bottom: 12px;
        }
        .notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 12px; color: white;
            font-weight: 500; z-index: 2000; animation: slideDown 0.3s ease;
        }
        .notification.success { background: linear-gradient(135deg, #10b981, #059669); }
        .notification.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .notification.info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        @keyframes slideDown {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        .copy-row-btn {
            background: rgba(255,255,255,0.1); border: none; border-radius: 6px;
            padding: 4px 8px; color: white; font-size: 12px;
            display: inline-flex; align-items: center; gap: 4px;
            cursor: pointer; transition: all 0.2s ease; margin: 2px;
        }
        .copy-row-btn:hover { background: rgba(124, 58, 237, 0.3); }
        .error-message { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); color: #fecaca; }
        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #4f46e5, #7c3aed); transition: width 0.3s ease; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <!-- عنوان الموقع -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-white flex items-center gap-3">
                <i class="fas fa-shield-halbed text-yellow-300"></i>
                <span>فاحص التوكنات</span>
            </h1>
            <div class="flex gap-4 text-white/80">
                <i class="fas fa-bell cursor-pointer hover:text-white transition"></i>
            </div>
        </div>

        <!-- بطاقة الإدخال -->
        <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-6 mb-8 border border-white/20 shadow-xl">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-1 h-8 bg-gradient-to-b from-blue-400 to-purple-400 rounded-full"></div>
                <h2 class="text-xl font-semibold text-white">إدخال التوكنات</h2>
                <span class="text-white/40 text-sm">(توكن واحد في كل سطر)</span>
            </div>
            
            <textarea id="tokensInput" 
                      class="w-full h-40 bg-white/5 border border-white/10 rounded-xl p-4 text-white placeholder-white/30 focus:outline-none focus:border-purple-400 transition resize-none font-mono text-sm"
                      placeholder="أدخل التوكنات هنا..."></textarea>
            
            <div id="progressBar" class="progress-bar hidden">
                <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
            
            <div class="flex flex-wrap justify-between items-center mt-4 gap-3">
                <div class="flex gap-2">
                    <button onclick="pasteTokens()" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-white text-sm flex items-center gap-2 transition">
                        <i class="fas fa-paste"></i> لصق
                    </button>
                    <button onclick="clearTokens()" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-white text-sm flex items-center gap-2 transition">
                        <i class="fas fa-trash"></i> مسح
                    </button>
                    <button onclick="loadExample()" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-white text-sm flex items-center gap-2 transition">
                        <i class="fas fa-file-alt"></i> نموذج
                    </button>
                </div>
                
                <button onclick="checkTokens()" id="checkBtn" class="check-btn px-8 py-3 rounded-xl text-white font-bold flex items-center gap-3 shadow-lg">
                    <i class="fas fa-magic"></i>
                    <span>فحص التوكنات</span>
                    <span id="loadingSpinner" class="hidden"><i class="fas fa-spinner fa-spin"></i></span>
                </button>
            </div>

            <div id="errorMessage" class="error-message hidden mt-4 p-3 rounded-lg text-sm"></div>
        </div>

        <!-- عنوان النتائج -->
        <div class="flex items-center gap-3 mb-6">
            <div class="w-1 h-8 bg-gradient-to-b from-green-400 to-emerald-400 rounded-full"></div>
            <h2 class="text-2xl font-bold text-white">نتائج الفحص</h2>
            <div class="flex gap-2 mr-auto">
                <span class="bg-white/20 text-white/80 px-3 py-1 rounded-full text-sm flex items-center gap-2">
                    <i class="fas fa-clock"></i>
                    <span id="lastUpdate">آخر تحديث: لم يتم الفحص بعد</span>
                </span>
            </div>
        </div>

        <!-- بطاقات النتائج -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <!-- شغال -->
            <div class="stat-card bg-gradient-to-br from-green-500 to-green-600 rounded-2xl p-5 text-white shadow-lg">
                <div class="flex items-center justify-between mb-3">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
                        <i class="fas fa-check-circle text-xl"></i>
                    </div>
                    <span class="text-3xl font-bold" id="workingCount">0</span>
                </div>
                <div class="text-sm opacity-90">✅ شغال</div>
                <div class="text-xs opacity-75">حسابات كاملة بدون رسائل</div>
                <div class="mt-3 flex gap-2">
                    <button onclick="downloadResults('working')" class="flex-1 bg-white/20 hover:bg-white/30 rounded-lg py-1 text-xs flex items-center justify-center gap-1 transition">
                        <i class="fas fa-download"></i> تحميل
                    </button>
                    <button onclick="viewResults('working')" class="flex-1 bg-white/20 hover:bg-white/30 rounded-lg py-1 text-xs flex items-center justify-center gap-1 transition">
                        <i class="fas fa-eye"></i> عرض
                    </button>
                </div>
            </div>

            <!-- Verify by Email -->
            <div class="stat-card bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl p-5 text-white shadow-lg">
                <div class="flex items-center justify-between mb-3">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
                        <i class="fas fa-envelope text-xl"></i>
                    </div>
                    <span class="text-3xl font-bold" id="emailVerifyCount">0</span>
                </div>
                <div class="text-sm opacity-90">📧 Verify by Email</div>
                <div class="text-xs opacity-75">يحتاج توثيق البريد</div>
                <div class="mt-3 flex gap-2">
                    <button onclick="downloadResults('emailVerify')" class="flex-1 bg-white/20 hover:bg-white/30 rounded-lg py-1 text-xs flex items-center justify-center gap-1 transition">
                        <i class="fas fa-download"></i> تحميل
                    </button>
                    <button onclick="viewResults('emailVerify')" class="flex-1 bg-white/20 hover:bg-white/30 rounded-lg py-1 text-xs flex items-center justify-center gap-1 transition">
                        <i class="fas fa-eye"></i> عرض
                    </button>
                </div>
            </div>

            <!-- Verify by Phone -->
            <div class="stat-card bg-gradient-to-br from-orange-500 to-orange-600 rounded-2xl p-5 text-white shadow-lg">
                <div class="flex items-center justify-between mb-3">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
                        <i class="fas fa-phone-alt text-xl"></i>
                    </div>
                    <span class="text-3xl font-bold" id="phoneVerifyCount">0</span>
                </div>
                <div class="text-sm opacity-90">📱 Verify by Phone</div>
                <div class="text-xs opacity-75">يحتاج توثيق الهاتف</div>
                <div class="mt-3 flex gap-2">
                    <button onclick="downloadResults('phoneVerify')" class="flex-1 bg-white/20 hover:bg-white/30 rounded-lg py-1 text-xs flex items-center justify-center gap-1 transition">
                        <i class="fas fa-download"></i> تحميل
                    </button>
                    <button onclick="viewResults('phoneVerify')" class="flex-1 bg-white/20 hover:bg-white/30 rounded-lg py-1 text-xs flex items-center justify-center gap-1 transition">
                        <i class="fas fa-eye"></i> عرض
                    </button>
                </div>
            </div>
        </div>

        <!-- جدول التفاصيل -->
        <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-6 border border-white/20 shadow-xl">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-1 h-8 bg-gradient-to-b from-blue-400 to-cyan-400 rounded-full"></div>
                    <h3 class="text-lg font-semibold text-white">تفاصيل النتائج</h3>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportAll()" class="px-3 py-1 bg-white/10 hover:bg-white/20 rounded text-white text-sm flex items-center gap-2 transition">
                        <i class="fas fa-file-export"></i> تصدير الكل
                    </button>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-white">
                    <thead>
                        <tr class="border-b border-white/10">
                            <th class="text-right py-3 px-4">#</th>
                            <th class="text-right py-3 px-4">التوكن</th>
                            <th class="text-right py-3 px-4">الحالة</th>
                            <th class="text-right py-3 px-4">البريد</th>
                            <th class="text-right py-3 px-4">الهاتف</th>
                            <th class="text-right py-3 px-4">Nitro</th>
                            <th class="text-right py-3 px-4">MFA</th>
                            <th class="text-right py-3 px-4">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody">
                        <tr><td colspan="8" class="text-center py-8 text-white/40"><i class="fas fa-inbox text-4xl mb-3 block"></i>لا توجد نتائج</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- نافذة العرض -->
    <div id="viewModal" class="modal-overlay">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-white flex items-center gap-2">
                    <i class="fas fa-list text-purple-400"></i>
                    <span id="modalTitle">نتائج الفحص</span>
                </h3>
                <button onclick="closeModal()" class="text-white/60 hover:text-white transition text-xl"><i class="fas fa-times"></i></button>
            </div>
            <div id="modalContent" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const DISCORD_API = 'https://discord.com/api/v9/users/@me';
        let results = { working: [], emailVerify: [], phoneVerify: [] };
        let allResults = [];

        function pasteTokens() { navigator.clipboard.readText().then(text => document.getElementById('tokensInput').value = text); }
        function clearTokens() { document.getElementById('tokensInput').value = ''; }
        function loadExample() {
            document.getElementById('tokensInput').value = 
                'M';   // شغال
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
        function showNotification(msg, type = 'info') {
            const n = document.createElement('div');
            n.className = `notification ${type}`;
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        function showError(msg) {
            const e = document.getElementById('errorMessage');
            e.textContent = msg;
            e.classList.remove('hidden');
            setTimeout(() => e.classList.add('hidden'), 5000);
        }

        // ==================== التصنيف بناءً على رسائل ديسكورد ====================
        function classifyToken(data, statusCode) {
            // التحقق من وجود رسائل Verify
            if (data.message) {
                if (data.message.includes('phone') || data.phone_verify) {
                    return { status: 'phoneVerify', message: '📱 Verify by Phone', email: '🔒', phone: '🔒' };
                }
                if (data.message.includes('email') || data.message.includes('verify your account')) {
                    return { status: 'emailVerify', message: '📧 Verify by Email', email: '🔒', phone: '🔒' };
                }
            }

            // إذا جاب بيانات المستخدم
            if (data.id) {
                return {
                    status: 'working',
                    email: data.verified ? '✅' : '🔒',
                    phone: data.phone ? '✅' : '🔒',
                    nitro: data.premium_type > 0 ? '💎' : '❌',
                    mfa: data.mfa_enabled ? '🔐' : '🔓',
                    username: data.username,
                    id: data.id,
                    message: '✅ شغال'
                };
            }
            
            return { status: 'error', message: '⚠️ حالة غير معروفة' };
        }

        async function checkSingleToken(token) {
            try {
                const r = await fetch(DISCORD_API, { headers: { 'Authorization': token } });
                const d = await r.json();
                
                if (r.status === 401) return { status: 'error', message: '❌ غير صالح' };
                
                const result = classifyToken(d, r.status);
                return { token, ...result };
            } catch (e) {
                return { token, status: 'error', message: '🌐 فشل الاتصال' };
            }
        }

        async function checkTokens() {
            const tokens = document.getElementById('tokensInput').value.split('\n').map(t => t.trim()).filter(t => t.length);
            if (!tokens.length) { showError('أدخل توكنات'); return; }
            
            results = { working: [], emailVerify: [], phoneVerify: [] };
            allResults = [];
            
            document.getElementById('loadingSpinner').classList.remove('hidden');
            document.getElementById('checkBtn').disabled = true;
            document.getElementById('progressBar').classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
            
            for (let i = 0; i < tokens.length; i++) {
                const r = await checkSingleToken(tokens[i]);
                
                if (r.status === 'working') results.working.push(tokens[i]);
                else if (r.status === 'emailVerify') results.emailVerify.push(tokens[i]);
                else if (r.status === 'phoneVerify') results.phoneVerify.push(tokens[i]);
                
                allResults.push({ token: tokens[i], ...r });
                updateUI();
                document.getElementById('progressFill').style.width = Math.round(((i+1)/tokens.length)*100) + '%';
                await sleep(500);
            }
            
            document.getElementById('loadingSpinner').classList.add('hidden');
            document.getElementById('checkBtn').disabled = false;
            document.getElementById('progressBar').classList.add('hidden');
            document.getElementById('lastUpdate').textContent = `آخر تحديث: ${new Date().toLocaleTimeString('ar-EG')}`;
            showNotification(`✅ تم الفحص`, 'success');
        }

        function updateUI() {
            document.getElementById('workingCount').textContent = results.working.length;
            document.getElementById('emailVerifyCount').textContent = results.emailVerify.length;
            document.getElementById('phoneVerifyCount').textContent = results.phoneVerify.length;
            
            const tbody = document.getElementById('resultsTableBody');
            tbody.innerHTML = '';
            if (!allResults.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-white/40"><i class="fas fa-inbox text-4xl mb-3 block"></i>لا توجد نتائج</td></tr>';
                return;
            }
            allResults.forEach((item, i) => {
                const row = document.createElement('tr');
                row.className = 'border-b border-white/5 hover:bg-white/5 transition';
                let statusText = '', statusClass = '';
                if (item.status === 'working') { statusText = '✅ شغال'; statusClass = 'text-green-400'; }
                else if (item.status === 'emailVerify') { statusText = '📧 Verify Email'; statusClass = 'text-blue-400'; }
                else if (item.status === 'phoneVerify') { statusText = '📱 Verify Phone'; statusClass = 'text-orange-400'; }
                else { statusText = '⚠️ خطأ'; statusClass = 'text-yellow-400'; }
                
                row.innerHTML = `
                    <td class="py-3 px-4 text-white/60">${i+1}</td>
                    <td class="py-3 px-4 font-mono text-sm">${item.token?.substring(0,30)}...</td>
                    <td class="py-3 px-4"><span class="font-semibold ${statusClass}">${statusText}</span></td>
                    <td class="py-3 px-4">${item.email || '❌'}</td>
                    <td class="py-3 px-4">${item.phone || '❌'}</td>
                    <td class="py-3 px-4">${item.nitro || '❌'}</td>
                    <td class="py-3 px-4">${item.mfa || '❌'}</td>
                    <td class="py-3 px-4">
                        <button class="copy-row-btn" onclick="copyToken('${item.token}')"><i class="fas fa-copy"></i></button>
                        <button class="copy-row-btn" onclick="viewDetails(${i})"><i class="fas fa-info-circle"></i></button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function viewResults(type) {
            if (!results[type]?.length) { showError('لا توجد نتائج'); return; }
            
            let title = '';
            if (type === 'working') title = 'التوكنات الشغالة ✅';
            else if (type === 'emailVerify') title = 'التوكنات Verify by Email 📧';
            else if (type === 'phoneVerify') title = 'التوكنات Verify by Phone 📱';
            
            document.getElementById('modalTitle').textContent = title;
            const mc = document.getElementById('modalContent');
            mc.innerHTML = '';
            results[type].forEach((token, i) => {
                const d = allResults.find(r => r.token === token);
                mc.innerHTML += `
                    <div class="token-detail-item">
                        <div class="token-detail-header">
                            <div class="token-index">${i+1}</div>
                            <button class="copy-btn" onclick="copyToken('${token}')"><i class="fas fa-copy"></i> نسخ</button>
                        </div>
                        <div class="token-text">${token}</div>
                        ${d?.message ? `<div class="text-sm ${type === 'working' ? 'text-green-400' : type === 'emailVerify' ? 'text-blue-400' : 'text-orange-400'}">${d.message}</div>` : ''}
                    </div>
                `;
            });
            document.getElementById('viewModal').classList.add('show');
        }

        function viewDetails(i) {
            const item = allResults[i];
            if (!item) return;
            
            let colorClass = 'text-green-400';
            if (item.status === 'emailVerify') colorClass = 'text-blue-400';
            else if (item.status === 'phoneVerify') colorClass = 'text-orange-400';
            
            document.getElementById('modalTitle').textContent = 'تفاصيل التوكن';
            document.getElementById('modalContent').innerHTML = `
                <div class="token-detail-item">
                    <div class="token-detail-header">
                        <div class="token-index">${i+1}</div>
                        <button class="copy-btn" onclick="copyToken('${item.token}')"><i class="fas fa-copy"></i> نسخ</button>
                    </div>
                    <div class="token-text">${item.token}</div>
                    <div class="space-y-2">
                        <div class="${colorClass}">${item.message || ''}</div>
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <div>البريد: ${item.email || '❌'}</div>
                            <div>الهاتف: ${item.phone || '❌'}</div>
                            <div>Nitro: ${item.nitro || '❌'}</div>
                            <div>MFA: ${item.mfa || '❌'}</div>
                        </div>
                        ${item.id ? `<div class="text-xs text-white/40">المعرف: ${item.id}</div>` : ''}
                        ${item.username ? `<div class="text-xs text-white/40">الاسم: ${item.username}</div>` : ''}
                    </div>
                </div>
            `;
            document.getElementById('viewModal').classList.add('show');
        }

        function copyToken(t) { navigator.clipboard.writeText(t); showNotification('✅ تم النسخ', 'success'); }
        function downloadResults(t) {
            if (!results[t]?.length) { showError('لا توجد نتائج'); return; }
            const b = new Blob([results[t].join('\n')], { type: 'text/plain;charset=utf-8' });
            const u = URL.createObjectURL(b);
            const a = document.createElement('a');
            a.href = u; a.download = `${t}_tokens.txt`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(u);
            showNotification(`✅ تم تحميل ${results[t].length} توكن`, 'success');
        }
        function exportAll() {
            if (!allResults.length) { showError('لا توجد نتائج'); return; }
            const b = new Blob([JSON.stringify(allResults, null, 2)], { type: 'application/json' });
            const u = URL.createObjectURL(b);
            const a = document.createElement('a');
            a.href = u; a.download = `all_results.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(u);
            showNotification(`✅ تم التصدير`, 'success');
        }
        function closeModal() { document.getElementById('viewModal').classList.remove('show'); }
        document.getElementById('viewModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    </script>
</body>
